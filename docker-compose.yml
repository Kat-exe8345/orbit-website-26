services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: orbit_nitt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: orbit_nitt
    volumes:
      - orbit_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit_nitt -d orbit_nitt"]
      interval: 5s
      timeout: 5s
      retries: 5
  
volumes:
  orbit_db: